syntax = "proto3";

package ros_messages;

option go_package = "webrtc_client/proto";
option optimize_for = SPEED;

// Mirrors geometry_msgs/Pose: position (x,y,z) + orientation (x,y,z,w).
message Pose {
    double x  = 1;
    double y  = 2;
    double z  = 3;
    double qx = 4;
    double qy = 5;
    double qz = 6;
    double qw = 7;
}
