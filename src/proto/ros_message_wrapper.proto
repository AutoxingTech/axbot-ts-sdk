syntax = "proto3";

package ros_messages;

import "point_cloud.proto";
import "mast_state.proto";
import "slam/submap_list.proto";
import "rack_states.proto";
import "towing_state.proto";
import "mobile_network_state.proto";
import "video_data.proto";

option go_package = "webrtc_client/proto";
option optimize_for = SPEED;

// Generic ROS message wrapper for extensibility
message RosMessageWrapper {
    enum MessageType {
        UNKNOWN = 0;
        POINT_CLOUD = 1;
        MAST_STATE = 2;
        SUBMAP_LIST = 3;
        RACK_STATES = 4;
        TOWING_STATE = 5;
        MOBILE_NETWORK_STATE = 6;
        VIDEO_DATA = 7;
    }
    
    MessageType type = 1;
    uint64 timestamp_ns = 2;  // Unix timestamp in nanoseconds
    uint32 sequence_id = 3;   // For ordering/packet loss detection

    oneof payload {
        PointCloud point_cloud = 10;
        bytes raw_data = 11;  // For unknown message types
        MastState mast_state = 12;
        ros_messages.slam.SubmapList submap_list = 13;
        RackStates rack_states = 14;
        TowingState towing_state = 15;
        MobileNetworkState mobile_network_state = 16;
        VideoData video_data = 17;
    }
}
