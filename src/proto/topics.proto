syntax = "proto3";

package ros_messages;

option go_package = "webrtc_client/proto";
option optimize_for = SPEED;

message TopicInfo {
  string name             = 1;
  string type             = 2;
  int32  publisher_count  = 3;
  int32  subscriber_count = 4;
}

message TopicListResponse {
  repeated TopicInfo topics = 1;
}

message PublishedTopicNamesResponse {
  repeated string names = 1;
}
