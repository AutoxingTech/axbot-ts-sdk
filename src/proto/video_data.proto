syntax = "proto3";

package ros_messages;

option go_package = "webrtc_client/proto";
option optimize_for = SPEED;

message VideoData {
    enum VideoFormat {
        VIDEO_FORMAT_UNKNOWN = 0;
        VIDEO_FORMAT_H264 = 1;
    }

    int32       width        = 1;
    int32       height       = 2;
    VideoFormat video_format = 3;
    bytes       data         = 4;
}
