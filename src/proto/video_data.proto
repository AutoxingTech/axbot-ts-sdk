syntax = "proto3";

package ros_messages;

option go_package = "webrtc_client/proto";
option optimize_for = SPEED;

message VideoData {
    message VideoFormat {
        enum Type {
            UNKNOWN = 0;
            H264    = 1;
        }
    }

    int32        width        = 1;
    int32        height       = 2;
    VideoFormat.Type video_format = 3;
    bytes       data         = 4;
}
