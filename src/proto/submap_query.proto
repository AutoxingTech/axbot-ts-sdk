syntax = "proto3";

package ros_messages;

import "geometry.proto";

option go_package = "webrtc_client/proto";
option optimize_for = SPEED;

// Mirrors cartographer_ros_msgs/StatusResponse.
message StatusResponse {
    uint32 code    = 1;
    string message = 2;
}

// Mirrors cartographer_ros_msgs/SubmapTexture.
// cell_format values:
//   0 = LOG_ODDS         (ProbabilityGrid / 3D submaps)
//   1 = TSDF_DELTA       (TSDF: actual delta = cell_value - 128)
//   2 = INTENSITY
message SubmapTexture {
    int32  cell_format = 1;
    bytes  cells       = 2;
    int32  width       = 3;
    int32  height      = 4;
    double resolution  = 5;
    int32  z_level     = 6;
    Pose   slice_pose  = 7;
}

// Response payload of cartographer_ros_msgs/SubmapQueryV2.
// Returned over HTTP as application/x-protobuf.
message SubmapQueryV2Response {
    StatusResponse         status         = 1;
    int32                  submap_version = 2;
    repeated SubmapTexture textures       = 3;
}
