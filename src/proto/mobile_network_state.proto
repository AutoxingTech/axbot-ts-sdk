syntax = "proto3";

package ros_messages;

option go_package = "webrtc_client/proto";
option optimize_for = SPEED;

message MobileNetworkState {
    message ModemState {
        enum Type {
            UNKNOWN      = 0;
            INITIALIZING = 1;
            READY        = 2;
            FAULT        = 3;
        }
    }

    message RecoveryRequest {
        enum Type {
            NONE        = 0;
            USB_RESET   = 1;
            HOST_REBOOT = 2;
        }
    }

    message SimState {
        enum Type {
            UNKNOWN        = 0;
            ABSENT         = 1;
            PIN_REQUIRED   = 2;
            PUK_REQUIRED   = 3;
            NETWORK_LOCKED = 4;
            READY          = 5;
            NOT_READY      = 6;
            CARD_IO_ERROR  = 8;
            NO_RESPONSE    = 255;
        }
    }

    message RegState {
        enum Type {
            NOT_REGISTERED   = 0;
            HOME             = 1;
            SEARCHING        = 2;
            DENIED           = 3;
            UNKNOWN          = 4;
            ROAMING          = 5;
            HOME_SMS_ONLY    = 6;
            ROAMING_SMS_ONLY = 7;
        }
    }

    message Rat {
        enum Type {
            UNKNOWN = 0;
            GSM     = 1;
            GPRS    = 2;
            EDGE    = 3;
            UMTS    = 4;
            HSDPA   = 5;
            HSUPA   = 6;
            HSPA    = 7;
            LTE     = 13;
            LTE_CA  = 19;
        }
    }

    message DataState {
        enum Type {
            DISCONNECTED = 0;
            CONNECTING   = 1;
            CONNECTED    = 2;
            SUSPENDED    = 3;
        }
    }

    // ── 1. Module hardware state ──
    ModemState.Type      modem_state       = 1;

    // ── 2. Recovery request ──
    RecoveryRequest.Type recovery_request  = 2;
    string               recovery_reason   = 3;

    // ── 3. SIM state ──
    SimState.Type        sim_state         = 4;

    // ── 4. Identity (read once after SIM ready) ──
    string               iccid             = 5;
    string               imei              = 6;
    string               imsi              = 7;
    string               model             = 8;
    string               firmware_ver      = 9;

    // ── 5. Network registration ──
    RegState.Type        reg_state         = 10;

    // ── 6. Access network type ──
    Rat.Type             rat               = 11;
    string               operator_name     = 12;
    uint32               lac               = 13;
    uint32               cell_id           = 14;

    // ── 7. Signal quality ──
    int32                rssi_dbm          = 15;
    int32                rsrp_dbm          = 16;
    int32                rsrq_db           = 17;
    int32                sinr_db           = 18;
    uint32               signal_level      = 19;

    // ── 8. Data link state ──
    DataState.Type       data_state        = 20;
    string               apn               = 21;
    string               ip_address        = 22;
    uint32               connected_duration_sec = 23;
    uint64               tx_bytes          = 24;
    uint64               rx_bytes          = 25;
}
